[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -c \"import os; port = int(os.environ.get('PORT', 8000)); import uvicorn; uvicorn.run('app.main:app', host='0.0.0.0', port=port, workers=1)\""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
